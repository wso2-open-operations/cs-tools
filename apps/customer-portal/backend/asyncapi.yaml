# asyncapi: '2.0.0'
# info:
#   title: 'WebSocket'
#   version: 1.0.0
# servers:
#   localhost:
#     url: localhost
#     protocol: ws
# channels:
#   /:
#    publish:
#      operationId: ReceiveMessage
#      message:
#        $ref: '#/components/messages/message'
#    subscribe:
#      operationId: SendMessage
#      message:
#        $ref: '#/components/messages/message'
# components:
#   messages:
#     message:
#       name: message
#       title: message
#       payload:
#         type: object
asyncapi: '2.0.0'

info:
  title: Support Chatbot WebSocket API
  version: '1.1.0'
  description: >
    Real-time streaming interface for the Support Chatbot service.
    Connect to /ws/{accountId}:{conversationId} to send messages and
    receive streamed AI responses.

servers:
  local:
    url: localhost:8001
    protocol: ws
    description: Local WebSocket server (REST runs on port 8000)

channels:
  /{sessionId}:
    parameters:
      sessionId:
        description: >
          Session key in accountId:conversationId format.
          Use any placeholder for a new conversation - the server
          resolves and reassigns the real conversation ID internally.
        schema:
          type: string
          example: account123:conv-abc-456

    subscribe:
      operationId: SendMessage
      summary: Messages sent from client to server
      message:
        oneOf:
          - $ref: '#/components/messages/PingMessage'
          - $ref: '#/components/messages/UserMessage'

    publish:
      operationId: ReceiveMessage
      summary: Messages sent from server to client
      message:
        oneOf:
          - $ref: '#/components/messages/PongMessage'
          - $ref: '#/components/messages/ThinkingStartMessage'
          - $ref: '#/components/messages/ThinkingStepMessage'
          - $ref: '#/components/messages/TokenMessage'
          - $ref: '#/components/messages/ThinkingEndMessage'
          - $ref: '#/components/messages/FinalMessage'
          - $ref: '#/components/messages/ErrorMessage'

components:
  messages:

    PingMessage:
      name: PingMessage
      title: Ping
      summary: Keepalive heartbeat. Server replies with PongMessage.
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum:
              - ping

    UserMessage:
      name: UserMessage
      title: User Chat Message
      summary: Send a user chat message. Triggers a stream of server events ending in FinalMessage.
      payload:
        type: object
        required:
          - type
          - accountId
          - message
        properties:
          type:
            type: string
            enum:
              - user_message
          accountId:
            type: string
            description: User account identifier
          conversationId:
            type: string
            nullable: true
            description: Existing conversation ID. Omit or null to start a new conversation.
          message:
            type: string
            description: The user chat message text
          envProducts:
            type: object
            nullable: true
            description: Account products per environment
            additionalProperties:
              type: array
              items:
                type: string

    PongMessage:
      name: PongMessage
      title: Pong
      summary: Keepalive response to a client PingMessage.
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum:
              - pong
          ts:
            type: number
            description: Unix epoch timestamp

    ThinkingStartMessage:
      name: ThinkingStartMessage
      title: Thinking Start
      summary: Emitted when the server starts processing. Show a loading indicator.
      payload:
        type: object
        required:
          - type
          - agent
        properties:
          type:
            type: string
            enum:
              - thinking_start
          agent:
            type: string
          ts:
            type: number

    ThinkingStepMessage:
      name: ThinkingStepMessage
      title: Thinking Step
      summary: Emitted when a tool is invoked. Use label to show progress in the UI.
      payload:
        type: object
        required:
          - type
          - step
          - label
        properties:
          type:
            type: string
            enum:
              - thinking_step
          step:
            type: string
            enum:
              - tool_activity
              - tool_info
          label:
            type: string
            description: Human-readable step description for the UI
          ts:
            type: number

    TokenMessage:
      name: TokenMessage
      title: Streaming Token
      summary: One streamed text chunk from the LLM. Append content to the message being rendered.
      payload:
        type: object
        required:
          - type
          - content
        properties:
          type:
            type: string
            enum:
              - token
          content:
            type: string
            description: Text chunk to append to the current message
          ts:
            type: number

    ThinkingEndMessage:
      name: ThinkingEndMessage
      title: Thinking End
      summary: Emitted after all tokens are streamed. Hide the loading indicator.
      payload:
        type: object
        required:
          - type
          - agent
        properties:
          type:
            type: string
            enum:
              - thinking_end
          agent:
            type: string
          ts:
            type: number

    FinalMessage:
      name: FinalMessage
      title: Final Response
      summary: >
        Complete structured response sent once per user turn.
        All response fields are nested inside the `payload` object.
        (Changed in v1.1.0 — previously fields were duplicated at the top level.)
      payload:
        type: object
        required:
          - type
          - payload
        properties:
          type:
            type: string
            enum:
              - final
          payload:
            type: object
            required:
              - message
              - sessionId
              - conversationId
            properties:
              message:
                type: string
                description: Full AI-generated response text
              sessionId:
                type: string
              conversationId:
                type: string
              intent:
                type: object
                nullable: true
                properties:
                  intentId:
                    type: string
                  intentLabel:
                    type: string
                  confidence:
                    type: number
                  severity:
                    type: string
                  caseType:
                    type: string
              slotState:
                type: object
                nullable: true
                properties:
                  intentId:
                    type: string
                  filledSlots:
                    type: object
                    additionalProperties:
                      type: string
                  missingSlots:
                    type: array
                    items:
                      type: string
                  isComplete:
                    type: boolean
                  slotOptions:
                    type: array
                    nullable: true
                    items:
                      type: object
                      properties:
                        slot:
                          type: string
                        label:
                          type: string
                        options:
                          type: array
                          items:
                            type: string
                        type:
                          type: string
              actions:
                type: array
                nullable: true
                description: >
                  UI action buttons. May contain multiple actions simultaneously
                  (e.g. both createCase and solutionProposed).
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      description: >
                        Action type identifier. Known values:
                        `createCase` — prompt user to create a support case;
                        `solutionProposed` — the agent believes its response
                        contains a concrete solution that may resolve the issue.
                        Additional action types may be added in the future.
                    label:
                      type: string
                    style:
                      type: string
                      enum:
                        - primary
                        - danger
                    payload:
                      type: object
                      additionalProperties: true
                      description: >
                        Data sent when the button is clicked.
                        Empty object for solutionProposed; case details for createCase.
              resolved:
                type: boolean
                nullable: true
              kbReferences:
                type: array
                nullable: true
                items:
                  type: object
                  properties:
                    sysKbId:
                      type: string
                    title:
                      type: string

    ErrorMessage:
      name: ErrorMessage
      title: Error
      summary: Sent when the server cannot process the client message.
      payload:
        type: object
        required:
          - type
          - message
        properties:
          type:
            type: string
            enum:
              - error
          message:
            type: string
          details:
            type: array
            nullable: true
            items:
              type: object
              properties:
                loc:
                  type: array
                  items:
                    type: string
                msg:
                  type: string
                type:
                  type: string
