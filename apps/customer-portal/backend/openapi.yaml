                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
  /projects/{id}/registry-tokens/search:
    post:
      summary: Search registry tokens for a project based on provided filters.
      operationId: postProjectsIdRegistryTokensSearch
      parameters:
      - name: id
        in: path
        description: ID of the project for which registry tokens are to be searched
        required: true
        schema:
          $ref: '#/components/schemas/IdString'
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
  /registry-tokens/{id}:
    delete:
      summary: Delete a registry token by token ID.
      operationId: deleteRegistryTokensId
      parameters:
      - name: id
        in: path
        description: ID of the registry token to be deleted
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /registry-tokens/{id}/regenerate:
    post:
      summary: Regenerate the secret of a registry token by token ID.
      operationId: postRegistryTokensIdRegenerate
      parameters:
      - name: id
        in: path
        description: ID of the registry token to be regenerated
        required: true
        schema:
          type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCreationResponse'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /projects/{id}/integration-users:
    get:
      summary: Get integration users of a project by project ID.
      operationId: getProjectsIdIntegrationUsers
      parameters:
      - name: id
        in: path
        description: ID of the project
        required: true
        schema:
          $ref: '#/components/schemas/IdString'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationUser'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /projects/{projectId}/deployments/{deploymentId}/license:
    post:
      summary: Download license for a project deployment.
      operationId: postProjectsProjectidDeploymentsDeploymentidLicense
      parameters:
      - name: projectId
        in: path
        description: ID of the project
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        description: ID of the deployment
        required: true
        schema:
          type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        "500":
          description: InternalServerError
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
components:
  schemas:
    Account:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: ID
          nullable: true
        domainList:
          type: string
          description: Allowed domain list of the account
          nullable: true
        classification:
          type: string
          description: Account classification
          nullable: true
        isPartner:
          type: boolean
          description: Whether the account is a partner or not
          nullable: true
      description: Account details record
    Attachment:
      required:
      - createdBy
      - createdOn
      - description
      - downloadUrl
      - id
      - name
      - size
      - type
      type: object
      properties:
        id:
          type: string
          description: ID of the attachment
        name:
          type: string
          description: File name
        type:
          type: string
          description: MIME type of the file
        size:
          type: integer
          description: File size(in Bytes)
          format: int64
        createdBy:
          type: string
          description: User who created the attachment
        createdOn:
          type: string
          description: Created date and time
        downloadUrl:
          type: string
          description: Download URL
          nullable: true
        description:
          type: string
          description: Description of the attachment
          nullable: true
      additionalProperties: false
      description: Attachment data.
    AttachmentCreatePayload:
      required:
      - content
      - name
      - type
      type: object
      properties:
        name:
          type: string
          description: File name
        type:
          type: string
          description: MIME type of the file
        content:
          type: string
          description: Base 64 encoded content
        description:
          type: string
          description: Description of the attachment
          nullable: true
      additionalProperties: false
      description: Payload for creating an attachment.
    AttachmentResponse:
      type: object
      description: Attachment details response.
      allOf:
      - $ref: '#/components/schemas/Attachment'
      - required:
        - content
        type: object
        properties:
          content:
            type: string
            description: "Base64 encoded file content (data URI format: data:@file/<type>;base64,<content>)"
    AttachmentUpdatePayload:
      type: object
      properties:
        name:
          type: string
          description: File name
          nullable: true
        description:
          type: string
          description: Description of the attachment (only for deployment type)
          nullable: true
      additionalProperties: false
      description: Payload for updating an attachment.
    AttachmentsResponse:
      type: object
      description: Attachments response.
      allOf:
      - $ref: '#/components/schemas/Pagination'
      - required:
        - attachments
        - totalRecords
        type: object
        properties:
          attachments:
            type: array
            description: List of attachments
            items:
              $ref: '#/components/schemas/Attachment'
          totalRecords:
            type: integer
            description: Total records count
            format: int64
          offset:
            type: integer
            format: int64
          limit:
            type: integer
            format: int64
    CallRequestCreatePayload:
      required:
      - durationInMinutes
      - reason
      - utcTimes
      type: object
      properties:
        reason:
          type: string
          description: Reason for the call request
        utcTimes:
          minItems: 1
          type: array
          description: Preferred UTC times for the call
          items:
            $ref: '#/components/schemas/DateTime'
        durationInMinutes:
          minimum: 1
          type: integer
          description: Duration in minutes
          format: int64
      additionalProperties: false
      description: Request payload for creating a call request.
    CallRequestSearchPayload:
      type: object
      properties:
        filters:
          type: object
          properties:
            stateKeys:
              type: array
              description: List of state keys to filter
              items:
                type: integer
                format: int64
          description: Filter criteria
        pagination:
          $ref: '#/components/schemas/Pagination'
      additionalProperties: false
      description: Request payload for searching call requests.
    CallRequestUpdatePayload:
      required:
      - stateKey
      type: object
      properties:
        stateKey:
          type: integer
          description: State key
          format: int64
        cancellationReason:
          type: string
          description: Reason for the requested call cancellation
        utcTimes:
          type: array
          description: New preferred UTC times for the call (mandatory when stateKey
            is 2)
          items:
            $ref: '#/components/schemas/DateTime'
      additionalProperties: false
      description: Request payload for updating a call request.
    Case:
      required:
      - assignedTeam
      - createdBy
      - createdOn
      - description
      - duration
      - id
      - internalId
      - issueType
      - number
      - product
      - severity
      - status
      - title
      type: object
      properties:
        id:
          type: string
          description: Case ID
        internalId:
          type: string
          description: Internal case ID
        number:
          type: string
          description: Case number
        createdOn:
          type: string
          description: Created date and time
        createdBy:
          type: string
          description: Created by (User email)
        title:
          type: string
          description: Case title
          nullable: true
        description:
          type: string
          description: Case description
          nullable: true
        duration:
          type: string
          description: Duration
          nullable: true
        issueType:
          description: issueType of the case
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        severity:
          description: Severity of the case
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        status:
          description: State of the case
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        catalog:
          description: Catalog information (if the case is a service request)
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        catalogItem:
          description: Catalog item information (if the case is a service request)
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        assignedTeam:
          description: Assigned team
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        product:
          description: Product information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        engagementType:
          $ref: '#/components/schemas/ReferenceItem'
      additionalProperties: false
      description: Base case.
    CaseClassificationPayload:
      required:
      - chatHistory
      - envProducts
      - region
      - tier
      type: object
      properties:
        chatHistory:
          type: string
          description: Chat history
        envProducts:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Environment products
        region:
          type: string
          description: Region
        tier:
          type: string
          description: Tier
      description: Case classification payload.
    CaseClassificationResponse:
      required:
      - caseInfo
      - issueType
      - severityLevel
      type: object
      properties:
        issueType:
          type: string
          description: Issue type
        severityLevel:
          type: string
          description: Severity level
        caseInfo:
          $ref: '#/components/schemas/ChatCaseInfo'
      description: Case classification response.
    CaseCreateAttachment:
      required:
      - file
      - name
      type: object
      properties:
        name:
          type: string
          description: File name
        file:
          type: string
          description: Base64 encoded file content
      additionalProperties: false
      description: Attachment for creating a case.
    CaseCreatePayload:
      required:
      - deploymentId
      - projectId
      - type
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CaseType'
        projectId:
          $ref: '#/components/schemas/IdString'
        deploymentId:
          $ref: '#/components/schemas/IdString'
        deployedProductId:
          $ref: '#/components/schemas/IdString'
        title:
          type: string
          description: Case title (required for DEFAULT_CASE and SECURITY_REPORT_ANALYSIS)
        description:
          type: string
          description: Case description (required for DEFAULT_CASE and SECURITY_REPORT_ANALYSIS)
        issueTypeKey:
          type: integer
          description: Issue type ID (required for DEFAULT_CASE)
          format: int64
        severityKey:
          type: integer
          description: Severity key (required for DEFAULT_CASE)
          format: int64
        parentCaseId:
          $ref: '#/components/schemas/IdString'
        conversationId:
          $ref: '#/components/schemas/IdString'
        catalogId:
          $ref: '#/components/schemas/IdString'
        catalogItemId:
          $ref: '#/components/schemas/IdString'
        variables:
          type: array
          description: Variables for service request (required for SERVICE_REQUEST)
          items:
            $ref: '#/components/schemas/Variable'
        attachments:
          type: array
          description: List of attachments
          items:
            $ref: '#/components/schemas/CaseCreateAttachment'
      additionalProperties: false
      description: Payload for creating a case.
    CaseResponse:
      type: object
      description: Case information.
      allOf:
      - $ref: '#/components/schemas/Case'
      - required:
        - account
        - assignedEngineer
        - conversation
        - csManager
        - deployedProduct
        - deployment
        - parentCase
        - project
        - slaResponseTime
        - type
        - updatedOn
        type: object
        properties:
          updatedOn:
            type: string
            description: Last updated date and time
          slaResponseTime:
            type: string
            description: SLA response time
          project:
            description: Project
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          type:
            description: "Case type information (eg: incident, service request, etc.)"
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          assignedEngineer:
            description: Assigned engineer
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          parentCase:
            description: Related case information (if the case is related to an existing
              case)
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          conversation:
            description: Conversation information (if the case is related to a conversation)
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          deployment:
            type: object
            description: Deployment information
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
            - required:
              - type
              type: object
              properties:
                type:
                  type: string
                  description: Deployment type
                  nullable: true
          deployedProduct:
            type: object
            description: Deployed product information
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
            - required:
              - version
              type: object
              properties:
                version:
                  type: string
                  description: Deployed product version
                  nullable: true
          account:
            type: object
            description: Account information
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
            - required:
              - type
              type: object
              properties:
                type:
                  type: string
                  description: Account type
                  nullable: true
          csManager:
            type: object
            description: CS Manager information
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
            - required:
              - email
              type: object
              properties:
                email:
                  type: string
                  description: Email address
                  nullable: true
          closedOn:
            type: string
            description: Case closed date and time
            nullable: true
          closedBy:
            description: User who closed the case
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          closeNotes:
            type: string
            description: Close notes for the case closure
            nullable: true
          hasAutoClosed:
            type: boolean
            description: Indicates if the case is auto closed
            nullable: true
          changeRequests:
            type: array
            description: Change requests (only for service requests)
            nullable: true
            items:
              $ref: '#/components/schemas/ReferenceItem'
          engagementPaymentType:
            $ref: '#/components/schemas/ReferenceItem'
          engagementStartDate:
            description: Engagement start date
            nullable: true
            allOf:
            - $ref: '#/components/schemas/Date'
          engagementEndDate:
            description: Engagement end date
            nullable: true
            allOf:
            - $ref: '#/components/schemas/Date'
          variables:
            type: array
            description: Variables for service request
            nullable: true
            items:
              $ref: '#/components/schemas/ServiceRequestVariable'
        additionalProperties: false
    CaseSearchFilters:
      type: object
      properties:
        searchQuery:
          type: string
          description: "Search query for case number, title and description"
        issueId:
          type: integer
          description: Issue ID
          format: int64
        statusIds:
          type: array
          description: Status IDs
          items:
            type: integer
            format: int64
        caseTypes:
          type: array
          description: List of case types
          items:
            $ref: '#/components/schemas/CaseType'
        severityId:
          type: integer
          description: Severity ID
          format: int64
        deploymentId:
          type: string
          description: Deployment ID
        createdByMe:
          type: boolean
          description: Case created by the logged in user
      additionalProperties: false
      description: Case search filters.
    CaseSearchPayload:
      type: object
      properties:
        filters:
          $ref: '#/components/schemas/CaseSearchFilters'
        sortBy:
          $ref: '#/components/schemas/SortBy'
        pagination:
          $ref: '#/components/schemas/Pagination'
      additionalProperties: false
      description: Payload for case search.
    CaseSortField:
      type: string
      description: Valid case sort field values.
      enum:
      - state
      - severity
      - updatedOn
      - createdOn
    CaseType:
      type: string
      description: Case type enum
      enum:
      - engagement
      - announcement
      - security_report_analysis
      - service_request
      - default_case
    CaseUpdatePayload:
      required:
      - stateKey
      type: object
      properties:
        stateKey:
          type: integer
          description: State key to update
          format: int64
      additionalProperties: false
      description: Request payload for updating a case.
    CasesTrend:
      required:
      - period
      - severities
      type: object
      properties:
        period:
          type: string
          description: "Time unit identifier (e.g., \"2025 - Q1\", \"2025 - M1\")"
        severities:
          type: array
          description: Severity breakdown for the time unit
          items:
            $ref: '#/components/schemas/ChoiceListItem'
      description: Cases trend by time unit.
    CatalogSearchPayload:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
      additionalProperties: false
      description: Request payload for searching catalogs.
    ChangeRequest:
      required:
      - assignedEngineer
      - assignedTeam
      - case
      - createdOn
      - deployedProduct
      - deployment
      - duration
      - endDate
      - id
      - impact
      - number
      - product
      - project
      - startDate
      - state
      - title
      - type
      - updatedOn
      type: object
      properties:
        id:
          $ref: '#/components/schemas/IdString'
        number:
          type: string
          description: Change request number
        title:
          type: string
          description: Change request title
          nullable: true
        project:
          description: Project
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        case:
          description: Service request information (case)
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        deployment:
          description: Deployment information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        deployedProduct:
          description: Deployed product information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        product:
          description: Product information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        startDate:
          description: Planned start date and time
          nullable: true
          allOf:
          - $ref: '#/components/schemas/Date'
        endDate:
          description: Planned end date and time
          nullable: true
          allOf:
          - $ref: '#/components/schemas/Date'
        duration:
          type: string
          description: Duration
          nullable: true
        hasServiceOutage:
          type: boolean
          description: Indicates if the change request has a service outage
          default: false
        impact:
          description: Impact information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        state:
          description: State information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        type:
          description: Type information
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        assignedEngineer:
          description: Assigned engineer
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        assignedTeam:
          description: Assigned team
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReferenceItem'
        createdOn:
          type: string
          description: Created date and time
        updatedOn:
          type: string
          description: Updated date and time
      description: Change request data.
    ChangeRequestResponse:
      type: object
      description: Change request details information.
      allOf:
      - $ref: '#/components/schemas/ChangeRequest'
      - required:
        - approvedBy
        - approvedOn
        - communicationPlan
        - createdBy
        - description
        - hasCustomerApproved
        - hasCustomerReviewed
        - impactDescription
        - justification
        - rollbackPlan
        - serviceOutage
        - testPlan
        type: object
        properties:
          description:
            type: string
            description: Change request description
            nullable: true
          createdBy:
            type: string
            description: User who created the change request
          justification:
            type: string
            description: Justification for the change request
            nullable: true
          impactDescription:
            type: string
            description: Impact description
            nullable: true
          serviceOutage:
            type: string
            description: Service outage details
            nullable: true
          communicationPlan:
            type: string
            description: Communication plan
            nullable: true
          rollbackPlan:
            type: string
            description: Rollback plan
            nullable: true
          testPlan:
            type: string
            description: Test plan
            nullable: true
          hasCustomerApproved:
            type: boolean
            description: Indicates if the customer has approved
          hasCustomerReviewed:
            type: boolean
            description: Indicates if the customer has reviewed
          approvedBy:
            description: Internal approval details
            nullable: true
            allOf:
            - $ref: '#/components/schemas/ReferenceItem'
          approvedOn:
            type: string
            description: Internal approval date and time
            nullable: true
    ChangeRequestSearchPayload:
      type: object
      properties:
        filters:
          type: object
          properties:
            searchQuery:
              type: string
              description: Search query for change request number and title
            stateKeys:
              type: array
              description: List of change request state keys
              items:
                type: integer
                format: int64
            impactKey:
              type: integer
              description: Change request impact key
              format: int64
          additionalProperties: false
          description: Filter criteria
        pagination:
          $ref: '#/components/schemas/Pagination'
      additionalProperties: false
      description: Request payload for searching change requests.
    ChangeRequestUpdatePayload:
      required:
      - plannedStartOn
      type: object
      properties:
        plannedStartOn:
          $ref: '#/components/schemas/DateTimeWithoutTimezone'
      additionalProperties: false
      description: Request payload for updating a change request.
    ChatCaseInfo:
      required:
      - description
      - environment
      - productName
      - productVersion
      - region
      - shortDescription
      - tier
      type: object
      properties:
        description:
          type: string
          description: Description
        shortDescription:
          type: string
          description: Short description
        productName:
          type: string
          description: Product name
        productVersion:
          type: string
          description: Product version
        environment:
          type: string
          description: Environment
        tier:
          type: string
          description: Tier
        region:
          type: string
          description: Region
      description: Chat case information.
    ChoiceListItem:
      required:
      - id
      - label
      type: object
      properties:
        id:
          description: Choice list item value
          oneOf:
          - type: integer
            format: int64
          - type: string
        label:
          type: string
          description: Choice list item label
        count:
          type: integer
          description: Count
          format: int64
      description: Choice list item information.
    Comment:
      required:
      - content
      - createdBy
      - createdOn
      - hasInlineAttachments
      - id
      - inlineAttachments
      - isEscalated
      - type
      type: object
      properties:
        id:
          type: string
          description: ID
        content:
          type: string
          description: Content of the comment
        type:
          type: string
          description: Type of the comment
        createdOn:
          type: string
          description: Created date and time
        createdBy:
          type: string
          description: User who created the comment
        isEscalated:
          type: boolean
          description: Indicates if the comment is escalated
        hasInlineAttachments:
          type: boolean
          description: Indicates if the comment has inline attachments
        inlineAttachments:
          type: array
          description: List of inline attachments
          items:
            $ref: '#/components/schemas/InlineAttachment'
      additionalProperties: false
