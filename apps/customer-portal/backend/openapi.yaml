openapi: 3.0.1
info:
  title: Service Openapi Yaml
  version: 0.1.0
servers:
- url: "{server}:{port}/"
  variables:
    server:
      default: http://localhost
    port:
      default: "9090"
paths:
  /users/me:
    get:
      summary: Fetch user information of the logged in user.
      operationId: getUsersMe
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "404":
          description: NotFound
    patch:
      summary: Update user information of the logged in user.
      operationId: patchUsersMe
      requestBody:
        description: User update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdatePayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedUser'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
  /projects/search:
    post:
      summary: Search projects of the logged-in user.
      operationId: postProjectsSearch
      requestBody:
        description: Project search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
  /projects/{id}:
    get:
      summary: Get project details by ID.
      operationId: getProjectsId
      parameters:
      - name: id
        in: path
        description: ID of the project
        required: true
        schema:
          $ref: '#/components/schemas/IdString'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
        "403":
          description: Forbidden
        "404":
          description: NotFound
    patch:
      summary: Update project details by ID.
      operationId: patchProjectsId
      parameters:
      - name: id
        in: path
        description: ID of the project
        required: true
        schema:
