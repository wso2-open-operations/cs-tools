  /deployments:
    post:
      summary: Create a new deployment.
      operationId: postDeployment
      requestBody:
        description: Deployment creation payload.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreatePayload'
