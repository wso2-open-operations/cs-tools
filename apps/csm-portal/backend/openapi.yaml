  /products/{id}/versions/search:
    post:
      summary: Search versions for a specific product.
      operationId: postProductVersionsSearch
      parameters:
        - name: id
          in: path
          description: ID of the product
          required: true
          schema:
            type: string
      requestBody:
        description: Product version search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVersionSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVersionSearchResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /updates/levels/search:
    post:
      summary: Search updates between update levels.
      operationId: postUpdatesLevelsSearch
      requestBody:
        description: Update description request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDescriptionRequest'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/UpdateLevelGroup'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string

    UpdateCaseRequest:
      type: object
      description: |
        Exactly one of `state`, `priority`, `workState`, `watchList`, or `assigneeEmail` must be provided.
        `watchList` and `assigneeEmail` are supported only for the ServiceNow data source.
      oneOf:
        - required: [state]
        - required: [priority]
        - required: [workState]
        - required: [watchList]
        - required: [assigneeEmail]
      properties:
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: The new state to transition the case to.
        priority:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: The new priority (severity) of the case.
        workState:
          type: string
          enum: [ongoing, paused]
          description: The new work sub-state of the case. Only applicable when the case state is work_in_progress.
        watchList:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to set as the case watch list (ServiceNow only).
        assigneeEmail:
          type: string
          format: email
          description: Email of the engineer to assign to this case (ServiceNow only).

    UpdateCaseResponse:
      type: object
      required: [message, case]
      properties:
        message:
          type: string
        case:
          $ref: '#/components/schemas/UpdatedCase'

    UpdatedCase:
      type: object
      required: [id, updatedOn]
      properties:
        id:
          type: string
          format: uuid
        updatedOn:
          type: string
          format: date-time
        updatedBy:
          type: string
          description: Email or display name of the user who performed the update.
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        priority:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        workState:
          type: string
          enum: [ongoing, paused]
          nullable: true
          description: Work sub-state after the update. null when state is not work_in_progress.
        watchList:
          type: array
          items:
            $ref: '#/components/schemas/WatchListUser'
        assignedTo:
          nullable: true
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string

    WatchListUser:
      type: object
      required: [id, userName]
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    CaseCreatePayload:
      type: object
      required:
        - projectId
        - deploymentId
        - deployedProductId
        - subject
        - description
        - priority
        - issueType
      properties:
        projectId:
          type: string
          description: UUID of the project this case belongs to
        deploymentId:
          type: string
          description: UUID of the deployment this case relates to
        deployedProductId:
          type: string
          description: UUID of the deployed product this case relates to
        subject:
          type: string
          description: Short summary of the issue
        description:
          type: string
          description: Full description of the issue
        priority:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: Urgency level of the case
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Nature of the issue

    CaseSearchFilters:
      type: object
      properties:
        searchQuery:
          type: string
          description: Searches across subject, number, and wso2Id (case-insensitive)
        projectIds:
          type: array
          items:
            type: string
          description: Filter by project IDs (optional)
        deploymentIds:
          type: array
          items:
            type: string
          description: Filter by deployment IDs (optional)
        deployedProductIds:
          type: array
          items:
            type: string
          description: Filter by deployed product IDs (optional)
        stateKeys:
          type: array
          items:
            type: string
            enum:
              - open
              - work_in_progress
              - waiting_on_wso2
              - awaiting_info
              - reopened
              - solution_proposed
              - closed
          description: Filter by case state (optional)
        priorityKeys:
          type: array
          items:
            type: string
            enum:
              - catastrophic
              - critical
              - high
              - medium
              - low
          description: Filter by priority (optional)
        issueTypeKeys:
          type: array
          items:
            type: string
            enum:
              - error
              - partial_outage
              - performance_degradation
              - question
              - security_or_compliance
              - total_outage
          description: Filter by issue type (optional)
        closedStartDate:
          type: string
          format: date-time
          description: Filter cases closed on or after this UTC datetime (optional)
        closedEndDate:
          type: string
          format: date-time
          description: Filter cases closed on or before this UTC datetime (optional)
        startCreatedDate:
          type: string
          format: date-time
          description: Filter cases created on or after this UTC datetime (optional)
        endCreatedDate:
          type: string
          format: date-time
          description: Filter cases created on or before this UTC datetime (optional)
        startUpdatedDate:
          type: string
          format: date-time
          description: Filter cases updated on or after this UTC datetime (optional)
        endUpdatedDate:
          type: string
          format: date-time
          description: Filter cases updated on or before this UTC datetime (optional)
        createdBy:
          type: array
          items:
            type: string
            format: email
          description: Filter to cases created by these email addresses (optional)
        createdByMe:
          type: boolean
          description: When true, the caller's email (from JWT) is appended to createdBy (optional)

    CaseSearchPayload:
      type: object
      nullable: true
      properties:
        filters:
          $ref: '#/components/schemas/CaseSearchFilters'
        sortBy:
          type: object
          properties:
            field:
              type: string
              enum: [created_at, updated_at, closed_at]
              default: created_at
            order:
              type: string
              enum: [asc, desc]
              default: desc
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100

    CaseSearchResponse:
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseSearchView'
        total:
          type: integer
          description: Total number of matching cases
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Case:
      type: object
      properties:
