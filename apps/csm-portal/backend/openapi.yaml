  /cases/{case_id}/attachments/{attachment_id}/content:
    get:
      summary: Download the binary content of a case attachment.
      operationId: getCaseAttachmentContent
      parameters:
        - name: case_id
          in: path
          description: UUID of the case.
          required: true
          schema:
            type: string
            format: uuid
        - name: attachment_id
          in: path
          description: UUID of the attachment.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Raw file content. Content-Type is restricted to a safe allowlist; anything outside the allowlist is served as application/octet-stream. Content-Disposition is always attachment.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
