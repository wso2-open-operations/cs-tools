          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Case comment creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCommentCreatePayload'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseComment'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "409":
          description: Conflict — comments and activities (type=comment or type=activity) require the case to be work_in_progress with workState=ongoing. Work notes (type=work_note) are exempt and allowed in any state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

