      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        number:
          type: string

    CreateCallRequestPayload:
      type: object
      required: [reason, utcTimes, durationInMinutes]
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Reason for the call request.
        utcTimes:
          type: array
          minItems: 1
          items:
            type: string
          description: Preferred UTC times for the call.
        durationInMinutes:
          type: integer
          minimum: 1
          description: Duration of the call in minutes.

    CreateCallRequestResponse:
      type: object
      properties:
        message:
          type: string
        callRequest:
          type: object
          properties:
            id:
              type: string
              format: uuid
            createdOn:
              type: string
            createdBy:
              type: string
            state:
              $ref: '#/components/schemas/CallRequestState'

