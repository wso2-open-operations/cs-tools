components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string

    CaseCreatePayload:
      type: object
      required:
        - projectId
        - deploymentId
        - deployedProductId
        - subject
        - description
        - priority
        - issueType
      properties:
        projectId:
          type: string
          description: UUID of the project this case belongs to
        deploymentId:
          type: string
          description: UUID of the deployment this case relates to
        deployedProductId:
          type: string
          description: UUID of the deployed product this case relates to
        subject:
          type: string
          description: Short summary of the issue
        description:
          type: string
          description: Full description of the issue
        priority:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: Urgency level of the case
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Nature of the issue

    ProjectCaseSearchPayload:
      type: object
      nullable: true
      description: Case search payload for a project-scoped search. The project ID is taken from the URL path; any projectIds in the body are ignored.
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across subject, number, and wso2Id (case-insensitive)
        deploymentIds:
          type: array
          items:
            type: string
          description: Filter by deployment IDs (optional)
        deployedProductIds:
          type: array
          items:
            type: string
          description: Filter by deployed product IDs (optional)
        stateKeys:
          type: array
          items:
            type: string
            enum:
              - open
              - work_in_progress
              - waiting_on_wso2
              - awaiting_info
              - reopened
              - solution_proposed
              - closed
          description: Filter by case state (optional)
        priorityKeys:
          type: array
          items:
            type: string
            enum:
              - catastrophic
              - critical
              - high
              - medium
              - low
          description: Filter by priority (optional)
        issueTypeKeys:
          type: array
          items:
            type: string
            enum:
              - error
              - partial_outage
              - performance_degradation
              - question
              - security_or_compliance
              - total_outage
          description: Filter by issue type (optional)
        sortBy:
          type: object
          properties:
            field:
              type: string
              enum: [created_at, updated_at, closed_at]
              default: created_at
            order:
              type: string
              enum: [asc, desc]
              default: desc

    CaseSearchResponse:
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseSearchView'
        total:
          type: integer
          description: Total number of matching cases
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Case:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        wso2Id:
          type: string
        createdBy:
          type: string
        projectId:
          type: string
        deploymentId:
          type: string
        deployedProductId:
          type: string
        subject:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - catastrophic
            - critical
            - high
            - medium
            - low
        issueType:
          type: string
          enum:
            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time

    UserRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        userId:
          type: string
        email:
          type: string
          format: email

    UserIDEmailRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    EntityRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    DeployedProductRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string

    CaseView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        wso2Id:
          type: string
        subject:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - catastrophic
            - critical
            - high
            - medium
            - low
        issueType:
          type: string
          enum:
            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          $ref: '#/components/schemas/UserRef'
        project:
          $ref: '#/components/schemas/EntityRef'
        deployment:
          $ref: '#/components/schemas/EntityRef'
        deployedProduct:
          $ref: '#/components/schemas/DeployedProductRef'
        nextStates:
          type: array
          readOnly: true
          items:
            type: string
            enum:
              - open
              - work_in_progress
              - waiting_on_wso2
              - awaiting_info
