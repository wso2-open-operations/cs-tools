        "500":
          description: InternalServerError.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string

    UpdateCaseRequest:
      type: object
      description: |
        Exactly one of `state`, `severity`, `workState`, `watchList`, or `assigneeEmail` must be provided.
        `watchList` and `assigneeEmail` are supported only for the ServiceNow data source.
      oneOf:
        - required: [state]
        - required: [severity]
        - required: [workState]
        - required: [watchList]
        - required: [assigneeEmail]
      properties:
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: The new state to transition the case to.
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: The new severity of the case.
        workState:
          type: string
          enum: [ongoing, paused]
          description: The new work sub-state of the case. Only applicable when the case state is work_in_progress.
        watchList:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to set as the case watch list (ServiceNow only).
        assigneeEmail:
          type: string
          format: email
          description: Email of the engineer to assign to this case (ServiceNow only).

    UpdateCaseResponse:
      type: object
      required: [message, case]
      properties:
        message:
          type: string
        case:
          $ref: '#/components/schemas/UpdatedCase'

    UpdatedCase:
      type: object
      required: [id, updatedOn]
      properties:
        id:
          type: string
          format: uuid
        updatedOn:
          type: string
          format: date-time
        updatedBy:
          type: string
          description: Email or display name of the user who performed the update.
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        workState:
          type: string
          enum: [ongoing, paused]
          nullable: true
          description: Work sub-state after the update. null when state is not work_in_progress.
        watchList:
          type: array
          items:
            $ref: '#/components/schemas/WatchListUser'
        assignedTo:
          nullable: true
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string

    WatchListUser:
      type: object
      required: [id, userName]
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    CaseCreatePayload:
      type: object
      required:
        - type
        - projectId
        - deploymentId
        - deployedProductId
      properties:
        type:
          type: string
          enum: [case, service_request, security_report_analysis]
          description: |
            Case type.
            - `case`: standard support case; requires `subject`, `description`, `severity`, `issueType`.
            - `service_request`: catalog-based service request (ServiceNow only); requires `catalogId`, `catalogItemId`, `variables`.
            - `security_report_analysis`: security report (ServiceNow only); requires `subject`, `description`, and at least one entry in `attachments`.
        projectId:
          type: string
          description: UUID of the project this case belongs to
        deploymentId:
          type: string
          description: UUID of the deployment this case relates to
        deployedProductId:
          type: string
          description: UUID of the deployed product this case relates to
        subject:
          type: string
          description: Required for `case` and `security_report_analysis` types.
        description:
          type: string
          description: Required for `case` and `security_report_analysis` types.
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: Required for `case` type.
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Required for `case` type.
        catalogId:
          type: string
          format: uuid
          description: Required for `service_request` type. UUID of the catalog.
        catalogItemId:
          type: string
          format: uuid
          description: Required for `service_request` type. UUID of the catalog item.
        variables:
          type: array
          items:
            $ref: '#/components/schemas/CaseVariable'
          description: Required for `service_request` type.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/CaseAttachmentPayload'
          description: Required for `security_report_analysis` type (at least one entry).
        relatedCaseId:
          type: string
          format: uuid
          description: Optional UUID of a related case.
        conversationId:
          type: string
          format: uuid
          description: Optional UUID of a related conversation.
        watchList:
          type: array
          items:
            type: string
          description: Optional list of user IDs to notify.

    CaseSearchFilters:
      type: object
      properties:
        types:
          type: array
          items:
            type: string
            enum:
              - case
              - service_request
              - security_report_analysis
              - announcement
              - engagement
          description: Filter by case type (optional)
        searchQuery:
          type: string
          description: Searches across subject, number, and wso2Id (case-insensitive)
        projectIds:
          type: array
          items:
            type: string
          description: Filter by project IDs (optional)
        deploymentIds:
          type: array
          items:
            type: string
          description: Filter by deployment IDs (optional)
        states:
          type: array
          items:
            type: string
            enum:
              - open
              - work_in_progress
              - waiting_on_wso2
              - awaiting_info
              - reopened
              - solution_proposed
              - closed
          description: Filter by case state (optional)
        severities:
          type: array
          items:
            type: string
            enum:
              - catastrophic
              - critical
              - high
              - medium
              - low
          description: Filter by severity (optional)
        engagementTypes:
          type: array
          items:
            type: string
            enum:
              - migration
              - consultancy
              - new_feature_improvement
              - follow_up
              - onboarding
          description: Filter by engagement type (optional; only applies to engagement cases)
        issueTypes:
          type: array
          items:
            type: string
            enum:
              - error
              - partial_outage
              - performance_degradation
              - question
              - security_or_compliance
              - total_outage
          description: Filter by issue type (optional)
        closedStartDate:
          type: string
          format: date-time
          description: Filter cases closed on or after this UTC datetime (optional)
        closedEndDate:
          type: string
          format: date-time
          description: Filter cases closed on or before this UTC datetime (optional)
        startCreatedDate:
          type: string
          format: date-time
          description: Filter cases created on or after this UTC datetime (optional)
        endCreatedDate:
          type: string
          format: date-time
          description: Filter cases created on or before this UTC datetime (optional)
        startUpdatedDate:
          type: string
          format: date-time
          description: Filter cases updated on or after this UTC datetime (optional)
        endUpdatedDate:
          type: string
          format: date-time
          description: Filter cases updated on or before this UTC datetime (optional)
        createdBy:
          type: array
          items:
            type: string
            format: email
          description: Filter to cases created by these email addresses (optional)
        createdByMe:
          type: boolean
          description: When true, the caller's email (from JWT) is appended to createdBy (optional)

    CaseSearchPayload:
      type: object
      nullable: true
      properties:
        filters:
          $ref: '#/components/schemas/CaseSearchFilters'
        sortBy:
          type: object
          properties:
            field:
              type: string
              enum: [createdOn, updatedOn, severity, state]
              default: createdOn
            order:
              type: string
              enum: [asc, desc]
              default: desc
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100

    CaseSearchResponse:
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseSearchView'
        total:
          type: integer
          description: Total number of matching cases
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Case:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        wso2Id:
          type: string
        createdBy:
          type: string
        projectId:
          type: string
        deploymentId:
          type: string
        deployedProductId:
          type: string
        subject:
          type: string
        description:
          type: string
        severity:
          type: string
          enum:
            - catastrophic
            - critical
            - high
            - medium
            - low
        issueType:
          type: string
          enum:
            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        workState:
          type: string
          nullable: true
          enum:
            - ongoing
            - paused
          description: Sub-state of work_in_progress. Null when state is not work_in_progress.
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
          nullable: true

    UserRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        userId:
          type: string
        email:
          type: string
          format: email

    UserIDEmailRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    EntityRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    DeployedProductRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string

    CaseView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        wso2Id:
          type: string
        subject:
          type: string
        description:
          type: string
        severity:
          type: string
          enum:
            - catastrophic
            - critical
            - high
            - medium
            - low
        issueType:
          type: string
          enum:
            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        workState:
          type: string
          nullable: true
          enum:
            - ongoing
            - paused
          description: Sub-state of work_in_progress. Null when state is not work_in_progress.
        type:
          type: string
          nullable: true
          description: Case type (e.g. case, service_request). Null if not set.
        engagementType:
          type: string
          nullable: true
          description: Engagement type. Null if not set.
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the case was closed. null if not yet closed.
        createdBy:
          $ref: '#/components/schemas/UserRef'
        project:
          $ref: '#/components/schemas/EntityRef'
        deployment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        deployedProduct:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeployedProductRef'
        product:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        catalog:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        catalogItem:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        assignedTeam:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        conversation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        assignedEngineer:
          $ref: '#/components/schemas/AssignedEngineerRef'
        parentCase:
          $ref: '#/components/schemas/CaseNumberRef'
        relatedCase:
          $ref: '#/components/schemas/CaseNumberRef'
        account:
          $ref: '#/components/schemas/AccountRef'
        nextStates:
          type: array
          readOnly: true
          items:
            type: string
            enum:
              - open
              - work_in_progress
              - waiting_on_wso2
              - awaiting_info
              - reopened
              - solution_proposed
              - closed

    CaseSearchView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        wso2Id:
          type: string
        subject:
          type: string
        description:
          type: string
        severity:
          type: string
          enum:
            - catastrophic
            - critical
            - high
            - medium
            - low
        issueType:
          type: string
          enum:
            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        workState:
          type: string
          nullable: true
          enum:
            - ongoing
            - paused
          description: Sub-state of work_in_progress. Null when state is not work_in_progress.
        type:
          type: string
          description: Case type (e.g. case, service_request).
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the case was closed. null if not yet closed.
        createdBy:
          $ref: '#/components/schemas/UserIDEmailRef'
        project:
          $ref: '#/components/schemas/EntityRef'
        deployment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        deployedProduct:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        product:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        assignedEngineer:
          $ref: '#/components/schemas/AssignedEngineerRef'
        parentCase:
          $ref: '#/components/schemas/CaseNumberRef'
        relatedCase:
          $ref: '#/components/schemas/CaseNumberRef'
        account:
          $ref: '#/components/schemas/AccountRef'

    UpdateDescriptionRequest:
      type: object
      required:
        - productName
        - productVersion
        - startingUpdateLevel
        - endingUpdateLevel
      properties:
        productName:
          type: string
        productVersion:
          type: string
        startingUpdateLevel:
          type: integer
        endingUpdateLevel:
          type: integer

    UserResponse:
      type: object
      properties:
        email:
          type: string
        phoneNumber:
          type: string
        lastPasswordUpdateTime:
          type: string
        # TODO: id, firstName, lastName, timeZone, roles — requires entity

    UserUpdatePayload:
      type: object
      minProperties: 1
      properties:
        phoneNumber:
          type: string
          description: Mobile phone number in E.164 format
        # TODO: timeZone — requires entity

    UpdatedUser:
      type: object
      properties:
        phoneNumber:
          type: string
        # TODO: timeZone — requires entity

    UserSearchPayload:
      type: object
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across userName and email (case-insensitive); max 200 characters

    UserSearchResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          description: Total number of matching users
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        timezone:
          type: string
        userType:
          type: string
          enum: [internal, customer]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    AccountSearchPayload:
      type: object
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across name and sfId (case-insensitive); max 200 characters

    AccountSearchResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
          description: Total number of matching accounts
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Account:
      type: object
      properties:
        id:
          type: string
        sfId:
          type: string
        name:
          type: string
        tier:
          type: string
