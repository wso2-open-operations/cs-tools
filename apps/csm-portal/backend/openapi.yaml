  /deployments/{id}:
    patch:
      summary: Update a deployment's name, type, description, or deactivate it.
      operationId: patchDeployment
      parameters:
        - name: id
          in: path
          description: UUID of the deployment to update.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Deployment update payload. Provide either detail fields (name, type, description) or active=false, but not both.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentUpdatePayload'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentUpdateResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: NotFound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /deployments/search:
    post:
      summary: Search deployments.
      operationId: postDeploymentsSearch
      requestBody:
        description: Deployment search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentSearchResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: NotFound
          content:
