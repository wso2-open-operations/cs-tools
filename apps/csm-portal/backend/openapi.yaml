            - error
            - partial_outage
            - performance_degradation
            - question
            - security_or_compliance
            - total_outage
        state:
          type: string
          enum:
            - open
            - work_in_progress
            - waiting_on_wso2
            - awaiting_info
            - reopened
            - solution_proposed
            - closed
        workState:
          type: string
          nullable: true
          enum:
            - ongoing
            - paused
          description: Sub-state of work_in_progress. Null when state is not work_in_progress.
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
