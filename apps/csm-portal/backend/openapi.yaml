      type: object
      additionalProperties: false
      properties:
        filters:
          type: object
          additionalProperties: false
          properties:
            states:
              type: array
              items:
                type: string
                enum:
                  - pending_on_customer
                  - pending_on_wso2
                  - scheduled
                  - customer_rejected
                  - wso2_rejected
                  - canceled
                  - notes_pending
                  - concluded
              description: Filter by one or more states.
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100

    CallRequestView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        case:
          $ref: '#/components/schemas/CallRequestCaseRef'
        reason:
          type: string
        preferredTimes:
          type: array
          items:
            type: string
        durationMin:
          type: integer
        scheduleTime:
          type: string
        meetingLink:
          type: string
        createdOn:
          type: string
        updatedOn:
          type: string
        state:
          $ref: '#/components/schemas/CallRequestState'
        cancellationReason:
          type: string

    SearchCallRequestsResponse:
      type: object
      properties:
        callRequests:
          type: array
          items:
            $ref: '#/components/schemas/CallRequestView'
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    UpdateCallRequestPayload:
      type: object
      required: [state]
      additionalProperties: false
      properties:
        state:
          type: string
          enum:
            - pending_on_customer
            - pending_on_wso2
            - scheduled
            - customer_rejected
            - wso2_rejected
            - canceled
            - notes_pending
            - concluded
          description: New state for the call request.
        cancellationReason:
          type: string
          description: Reason for cancellation (required when cancelling).
        utcTimes:
          type: array
          items:
            type: string
          description: Updated preferred UTC times.
        durationInMinutes:
          type: integer
          minimum: 1
          description: Updated duration in minutes.

    UpdateCallRequestResponse:
      type: object
      properties:
        message:
          type: string
        callRequest:
          type: object
          properties:
            id:
              type: string
              format: uuid
            updatedOn:
              type: string
            updatedBy:
              type: string
