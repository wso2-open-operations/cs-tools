openapi: 3.0.1
info:
  title: CSM Portal API
  version: 1.0.0
security:
  - bearerAuth: []
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /cases:
    post:
      summary: Create a new case.
      operationId: postCases
      requestBody:
        description: Case creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCreatePayload'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: NotFound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /cases/{id}:
    get:
      summary: Get case by ID.
      operationId: getCasesId
      parameters:
        - name: id
          in: path
          description: UUID of the case.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The enriched case with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseView'
        "400":
          description: Bad request (e.g. malformed UUID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /cases/{id}/comments:
    post:
      summary: Create a comment on a case.
      operationId: postCasesIdComments
      parameters:
        - name: id
          in: path
          description: UUID of the case.
          required: true
