          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
