openapi: 3.0.1
info:
  title: CSM Portal API
  version: 1.0.0
security:
  - bearerAuth: []
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /cases:
    post:
      summary: Create a new case.
      operationId: postCases
      requestBody:
        description: Case creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCreatePayload'
        required: true
      responses:
        "201":
          description: Created
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

  /cases/search:
    post:
      summary: Search cases.
      operationId: postCasesSearch
      requestBody:
        description: Case search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

  /cases/{id}:
    get:
      summary: Get case by ID.
      operationId: getCasesId
      parameters:
        - name: id
          in: path
          description: ID of the case
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
        "401":
          description: Unauthorized
        "404":
          description: NotFound
        "500":
          description: InternalServerError

  /updates/recommended-update-levels:
    get:
      summary: Get recommended update levels for a user.
      operationId: getUpdatesRecommendedUpdateLevels
      parameters:
        - name: user
          in: query
          description: Email of the user
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError

  /updates/product-update-levels:
    get:
      summary: Get product update levels.
      operationId: getUpdatesProductUpdateLevels
      responses:
        "200":
          description: Ok
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError

  /updates/levels/search:
    post:
      summary: Search updates between update levels.
      operationId: postUpdatesLevelsSearch
      requestBody:
        description: Update description request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDescriptionRequest'
        required: true
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string

    CaseCreatePayload:
      type: object
      required:
        - type
        - projectId
        - deploymentId
      properties:
        type:
          type: string
          description: Case type (e.g. DEFAULT_CASE, SERVICE_REQUEST, SECURITY_REPORT_ANALYSIS)
        projectId:
          type: string
          description: Project ID
        deploymentId:
          type: string
          description: Deployment ID
        deployedProductId:
          type: string
          description: Deployed product ID
        title:
          type: string
          description: Case title (required for DEFAULT_CASE and SECURITY_REPORT_ANALYSIS)
        description:
          type: string
          description: Case description
        issueTypeKey:
          type: integer
          description: Issue type key (required for DEFAULT_CASE)
        severityKey:
          type: integer
          description: Severity key (required for DEFAULT_CASE)
        relatedCaseId:
          type: string
          description: Related case ID
        conversationId:
          type: string
          description: Conversation ID
        catalogId:
          type: string
          description: Catalog ID (required for SERVICE_REQUEST)
        catalogItemId:
          type: string
          description: Catalog item ID (required for SERVICE_REQUEST)

    CaseSearchPayload:
      type: object
      properties:
        filters:
          type: object
          properties:
            projectIds:
              type: array
              items:
                type: string
            searchQuery:
              type: string
            stateKeys:
              type: array
              items:
                type: integer
            severityKey:
              type: integer
            deploymentId:
              type: string
            createdByMe:
              type: boolean
        sortBy:
          type: object
          properties:
            field:
              type: string
            order:
              type: string
              enum: [ASC, DESC]
        pagination:
          $ref: '#/components/schemas/Pagination'

    UpdateDescriptionRequest:
      type: object
      required:
        - productName
        - productVersion
        - startingUpdateLevel
        - endingUpdateLevel
      properties:
        productName:
          type: string
        productVersion:
          type: string
        startingUpdateLevel:
          type: integer
        endingUpdateLevel:
          type: integer

    Pagination:
      type: object
      properties:
        offset:
          type: integer
          minimum: 0
          default: 0
        limit:
          type: integer
          minimum: 1
          default: 10
