openapi: 3.0.1
info:
  title: CSM Portal API
  version: 1.0.0
security:
  - bearerAuth: []
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /cases:
    post:
      summary: Create a new case.
      operationId: postCases
      requestBody:
        description: Case creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCreatePayload'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: NotFound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /cases/{id}:
    get:
      summary: Get case by ID.
      operationId: getCasesId
      parameters:
        - name: id
          in: path
          description: UUID of the case.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The enriched case with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseView'
        "400":
          description: Bad request (e.g. malformed UUID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
    patch:
      summary: Update a support case.
      description: |
        Updates exactly one field of the case. Provide exactly one of: `state`, `severity`,
        `workState`, `watchList`, or `assigneeEmail`. `watchList` and `assigneeEmail` are supported
        only when the ServiceNow data source is active.
      operationId: patchCasesId
      parameters:
        - name: id
          in: path
          description: UUID of the case.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseRequest'
      responses:
        "200":
          description: Case updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCaseResponse'
        "400":
          description: Bad request (e.g. malformed UUID, invalid state value, invalid state transition, or workState update attempted when case is not work_in_progress).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "403":
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "409":
          description: Conflict (e.g. concurrent update).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "422":
          description: Unprocessable entity (e.g. invalid state transition).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "503":
          description: Upstream service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

