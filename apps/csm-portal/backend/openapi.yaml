openapi: 3.0.1
info:
  title: CSM Portal API
  version: 1.0.0
security:
  - bearerAuth: []
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /cases:
    post:
      summary: Create a new case.
      operationId: postCases
      requestBody:
        description: Case creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCreatePayload'
        required: true
      responses:
        "201":
          description: Created
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

  /cases/search:
    post:
      summary: Search cases.
      operationId: postCasesSearch
      requestBody:
        description: Case search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

  /cases/{id}:
    get:
      summary: Get case by ID.
      operationId: getCasesId
      parameters:
        - name: id
          in: path
          description: ID of the case
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
        "401":
          description: Unauthorized
        "404":
          description: NotFound
        "500":
          description: InternalServerError

  /updates/recommended-update-levels:
    get:
      summary: Get recommended update levels for a user.
      operationId: getUpdatesRecommendedUpdateLevels
      parameters:
        - name: user
          in: query
          description: Email of the user
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError

  /updates/product-update-levels:
    get:
      summary: Get product update levels.
      operationId: getUpdatesProductUpdateLevels
      responses:
        "200":
          description: Ok
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError

  /users/me:
    get:
      summary: Get the current user's profile.
      operationId: getUsersMe
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
    patch:
      summary: Update the current user's profile.
      operationId: patchUsersMe
      requestBody:
        description: User update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdatePayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedUser'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /users/search:
    post:
      summary: Search users.
      operationId: postUsersSearch
      requestBody:
        description: User search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /accounts/search:
    post:
      summary: Search accounts.
      operationId: postAccountsSearch
      requestBody:
        description: Account search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSearchResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /projects/search:
    post:
      summary: Search projects.
      operationId: postProjectsSearch
      requestBody:
        description: Project search payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSearchPayload'
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSearchResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

  /updates/levels/search:
    post:
      summary: Search updates between update levels.
      operationId: postUpdatesLevelsSearch
      requestBody:
        description: Update description request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDescriptionRequest'
        required: true
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "401":
          description: Unauthorized
        "413":
          description: RequestEntityTooLarge
        "500":
          description: InternalServerError

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorPayload:
      type: object
      properties:
        message:
          type: string

    CaseCreatePayload:
      type: object
      required:
        - type
        - projectId
        - deploymentId
      properties:
        type:
          type: string
          description: Case type (e.g. DEFAULT_CASE, SERVICE_REQUEST, SECURITY_REPORT_ANALYSIS)
        projectId:
          type: string
          description: Project ID
        deploymentId:
          type: string
          description: Deployment ID
        deployedProductId:
          type: string
          description: Deployed product ID
        title:
          type: string
          description: Case title (required for DEFAULT_CASE and SECURITY_REPORT_ANALYSIS)
        description:
          type: string
          description: Case description
        issueTypeKey:
          type: integer
          description: Issue type key (required for DEFAULT_CASE)
        severityKey:
          type: integer
          description: Severity key (required for DEFAULT_CASE)
        relatedCaseId:
          type: string
          description: Related case ID
        conversationId:
          type: string
          description: Conversation ID
        catalogId:
          type: string
          description: Catalog ID (required for SERVICE_REQUEST)
        catalogItemId:
          type: string
          description: Catalog item ID (required for SERVICE_REQUEST)

    CaseSearchPayload:
      type: object
      properties:
        filters:
          type: object
          properties:
            projectIds:
              type: array
              items:
                type: string
            searchQuery:
              type: string
            stateKeys:
              type: array
              items:
                type: integer
            severityKey:
              type: integer
            deploymentId:
              type: string
            createdByMe:
              type: boolean
        sortBy:
          type: object
          properties:
            field:
              type: string
            order:
              type: string
              enum: [ASC, DESC]
        pagination:
          $ref: '#/components/schemas/Pagination'

    UpdateDescriptionRequest:
      type: object
      required:
        - productName
        - productVersion
        - startingUpdateLevel
        - endingUpdateLevel
      properties:
        productName:
          type: string
        productVersion:
          type: string
        startingUpdateLevel:
          type: integer
        endingUpdateLevel:
          type: integer

    UserResponse:
      type: object
      properties:
        email:
          type: string
        phoneNumber:
          type: string
        lastPasswordUpdateTime:
          type: string
        # TODO: id, firstName, lastName, timeZone, roles — requires entity

    UserUpdatePayload:
      type: object
      minProperties: 1
      properties:
        phoneNumber:
          type: string
          description: Mobile phone number in E.164 format
        # TODO: timeZone — requires entity

    UpdatedUser:
      type: object
      properties:
        phoneNumber:
          type: string
        # TODO: timeZone — requires entity

    UserSearchPayload:
      type: object
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across userName and email (case-insensitive); max 200 characters

    UserSearchResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          description: Total number of matching users
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        timezone:
          type: string
        userType:
          type: string
          enum: [internal, customer]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountSearchPayload:
      type: object
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across name and sfId (case-insensitive); max 200 characters

    AccountSearchResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
          description: Total number of matching accounts
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Account:
      type: object
      properties:
        id:
          type: string
        sfId:
          type: string
        name:
          type: string
        tier:
          type: string
          enum: [basic, enterprise]
        region:
          type: string
        activationDate:
          type: string
          format: date-time
        deactivationDate:
          type: string
          format: date-time
        ownerId:
          type: string
        technicalOwnerId:
          type: string
        agentEnabled:
          type: boolean
        kbReferencesEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectSearchPayload:
      type: object
      properties:
        pagination:
          allOf:
            - $ref: '#/components/schemas/Pagination'
            - properties:
                limit:
                  default: 20
                  maximum: 100
        searchQuery:
          type: string
          description: Searches across name, projectKey, and subscriptionType (case-insensitive); max 200 characters

    ProjectSearchResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer
          description: Total number of matching projects
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    Project:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        sfId:
          type: string
        name:
          type: string
        projectKey:
          type: string
        subscriptionType:
          type: string
          enum:
            - development_support
            - managed_cloud_subscription
            - evaluation_subscription
            - subscription
            - cloud_evaluation_support
            - internal
            - platformer_subscription
            - cloud_support
            - professional_services
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        offset:
          type: integer
          minimum: 0
          default: 0
        limit:
          type: integer
          minimum: 1
          default: 10
