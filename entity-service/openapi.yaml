openapi: 3.0.1
info:
  title: Entity Service API
  version: 1.0.0
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /users/search:
    post:
      summary: Search users by username or email.
      operationId: searchUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchUsersRequest'
      responses:
        "200":
          description: Users matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchUsersResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{id}:
    get:
      summary: Get an account by ID.
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The account with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/search:
    post:
      summary: Search accounts by name or Salesforce ID.
      operationId: searchAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAccountsRequest'
      responses:
        "200":
          description: Accounts matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAccountsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}:
    get:
      summary: Get a project by ID.
      operationId: getProject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The project with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailsView'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/search:
    post:
      summary: Search projects by name, key, or subscription type.
      operationId: searchProjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProjectsRequest'
      responses:
        "200":
          description: Projects matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProjectsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/search:
    post:
      summary: Search products by name.
      operationId: searchProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProductsRequest'
      responses:
        "200":
          description: Products matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProductsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}/versions/search:
    post:
      summary: Search versions of a specific product.
      operationId: searchProductVersions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProductVersionsRequest'
      responses:
        "200":
          description: Product versions matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProductVersionsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployments/search:
    post:
      summary: Search deployments by name, project IDs, or deployment type.
      operationId: searchDeployments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchDeploymentsRequest'
      responses:
        "200":
          description: Deployments matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDeploymentsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}:
    get:
      summary: Get a support case by ID.
      operationId: getCase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The case with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseView'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a support case.
      description: |
        Updates exactly one field of the case. Provide exactly one of: `stateKey`, `severityKey`,
        `workStateKey`, `watchList`, or `assigneeEmail`. `watchList` and `assigneeEmail` are supported
        only when the ServiceNow data source is active.
      operationId: patchCase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseRequest'
      responses:
        "200":
          description: Case updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCaseResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases:
    post:
      summary: Create a new support case.
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        "201":
          description: Case created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCaseResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/search:
    post:
      summary: Search support cases.
      operationId: searchCases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchCasesRequest'
      responses:
        "200":
          description: Cases matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCasesResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/comments:
    post:
      summary: Create a comment on a support case.
      operationId: createCaseComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseCommentRequest'
      responses:
        "201":
          description: Comment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseComment'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/comments/search:
    post:
      summary: Search comments on a support case.
      operationId: searchCaseComments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchCaseCommentsRequest'
      responses:
        "200":
          description: Comments for the case, ordered by created_at DESC.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCaseCommentsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/attachments:
    post:
      summary: Upload a file attachment to a support case.
      operationId: createCaseAttachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentRequest'
      responses:
        "201":
          description: Attachment uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAttachmentResponse'
        "400":
          description: Bad request (missing fields, invalid data URI, or file exceeds 10 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/attachments/search:
    post:
      summary: Search attachments linked to a support case.
      operationId: searchCaseAttachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAttachmentsRequest'
      responses:
        "200":
          description: Paginated list of attachments for the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAttachmentsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{case_id}/attachments/{attachment_id}/content:
    get:
      summary: Download the binary content of a case attachment.
      operationId: getCaseAttachmentContent
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Case UUID.
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Attachment UUID.
      responses:
        "200":
          description: Raw file content. Content-Type reflects the actual file type (e.g. image/png, application/pdf).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Attachment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployed-products/search:
    post:
      summary: Search deployed products by deployment IDs.
      operationId: searchDeployedProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchDeployedProductsRequest'
      responses:
        "200":
          description: Deployed products matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDeployedProductsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          description: Number of results per page. Defaults to 20, capped at 100.
        offset:
          type: integer
          description: Zero-based offset into the result set.

    SearchUsersRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against username and email.

    User:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        userType:
          type: string
          enum: [internal, customer, system]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchAccountsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against name and sf_id.

    Account:
      type: object
      properties:
        id:
          type: string
        sfId:
          type: string
        name:
          type: string
        tier:
          type: string
          enum: [basic, enterprise]
        region:
          type: string
          nullable: true
        activationDate:
          type: string
          format: date-time
        deactivationDate:
          type: string
          format: date-time
          nullable: true
        ownerId:
          type: string
        technicalOwnerId:
          type: string
          nullable: true
        agentEnabled:
          type: boolean
        kbReferencesEnabled:
          type: boolean
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchAccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchProjectsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against name, key, and subscription_type.

    ProjectAccountRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        activationDate:
          type: string
          format: date-time
          nullable: true
        tier:
          type: string
        region:
          type: string
          nullable: true
        agentEnabled:
          type: boolean
        kbReferencesEnabled:
          type: boolean

    ProjectDetailsView:
      type: object
      properties:
        id:
          type: string
        account:
          $ref: '#/components/schemas/ProjectAccountRef'
        sfId:
          type: string
        name:
          type: string
        key:
          type: string
        subscriptionType:
          type: string
          enum:
            - development_support
            - managed_cloud_subscription
            - evaluation_subscription
            - subscription
            - cloud_evaluation_support
            - internal
            - platformer_subscription
            - cloud_support
            - professional_services
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    ProjectView:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        subscriptionType:
          type: string
          enum:
            - development_support
            - managed_cloud_subscription
            - evaluation_subscription
            - subscription
            - cloud_evaluation_support
            - internal
            - platformer_subscription
            - cloud_support
            - professional_services
        createdOn:
          type: string
          format: date-time

    SearchProjectsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectView'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchProductsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against product name.

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        class:
          type: string
          enum: [software, service]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchProductVersionsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against version string.

    ProductVersion:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        version:
          type: string
        currentSupportStatus:
          type: string
          enum: [available, extended, deprecated, discontinued]
        releaseDate:
          type: string
          format: date-time
        supportEolDate:
          type: string
          format: date-time
          nullable: true
        earliestPossibleSupportEolDate:
          type: string
          format: date-time
          nullable: true
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchProductVersionsResponse:
      type: object
      properties:
        productVersions:
          type: array
          items:
            $ref: '#/components/schemas/ProductVersion'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchDeploymentsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against deployment name.
        projectIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by project UUIDs.
        deploymentTypeKeys:
          type: array
          items:
            type: string
            enum:
              - primary_production
              - staging
              - qa
              - stress
              - uat
              - development
          description: Filter by deployment types.

    DeploymentView:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - primary_production
            - staging
            - qa
            - stress
            - uat
            - development
        description:
          type: string
          nullable: true
        createdBy:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EntityRef'
        project:
          $ref: '#/components/schemas/EntityRef'
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchDeploymentsResponse:
      type: object
      properties:
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentView'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchDeployedProductsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        deploymentIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by deployment UUIDs.

    DeployedProductVersionRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        releasedDate:
          type: string
          format: date-time
          nullable: true
        supportEoLDate:
          type: string
          format: date-time
          nullable: true

    DeployedProductView:
      type: object
      properties:
        id:
          type: string
        deployment:
          $ref: '#/components/schemas/EntityRef'
        product:
          $ref: '#/components/schemas/EntityRef'
        version:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeployedProductVersionRef'
        cores:
          type: string
          nullable: true
        tps:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchDeployedProductsResponse:
      type: object
      properties:
        deployedProducts:
          type: array
          items:
            $ref: '#/components/schemas/DeployedProductView'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    UpdateCaseRequest:
      type: object
      description: |
        Exactly one of `stateKey`, `severityKey`, `workStateKey`, `watchList`, or `assigneeEmail` must be provided.
        `watchList` and `assigneeEmail` are supported only for the ServiceNow data source.
      oneOf:
        - required: [stateKey]
        - required: [severityKey]
        - required: [workStateKey]
        - required: [watchList]
        - required: [assigneeEmail]
      properties:
        stateKey:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: The new state to transition the case to.
        severityKey:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: The new severity of the case.
        workStateKey:
          type: string
          enum: [ongoing, paused]
          description: The new work sub-state of the case. Only applicable when the case state is work_in_progress.
        watchList:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to set as the case watch list (ServiceNow only).
        assigneeEmail:
          type: string
          format: email
          description: Email of the engineer to assign to this case (ServiceNow only).

    UpdateCaseResponse:
      type: object
      required: [message, case]
      properties:
        message:
          type: string
        case:
          $ref: '#/components/schemas/UpdatedCase'

    UpdatedCase:
      type: object
      required: [id, updatedOn]
      properties:
        id:
          type: string
          format: uuid
        updatedOn:
          type: string
          format: date-time
        updatedBy:
          type: string
          description: Email or display name of the user who performed the update.
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        workState:
          type: string
          enum: [ongoing, paused]
          nullable: true
          description: Work sub-state after the update. null when state is not work_in_progress.
        watchList:
          type: array
          items:
            $ref: '#/components/schemas/WatchListUser'
        assignedTo:
          nullable: true
          $ref: '#/components/schemas/AssignedEngineerRef'

    WatchListUser:
      type: object
      required: [id, userName]
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    CreateCaseRequest:
      type: object
      required: [projectId, deploymentId, deployedProductId, subject, description, severityKey, issueTypeKey]
      properties:
        projectId:
          type: string
          format: uuid
        deploymentId:
          type: string
          format: uuid
        deployedProductId:
          type: string
          format: uuid
        subject:
          type: string
        description:
          type: string
        severityKey:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        issueTypeKey:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]

    CreateCaseResponse:
      type: object
      properties:
        message:
          type: string
        case:
          type: object
          properties:
            id:
              type: string
            internalId:
              type: string
            number:
              type: string
            createdBy:
              type: string
            createdOn:
              type: string
              format: date-time
            state:
              type: string

    SearchCasesFilters:
      type: object
      properties:
        typeKeys:
          type: array
          items:
            type: string
            enum: [support, service_request, security_report_analysis, announcement, engagement]
          description: |
            Filter by case type. For the ServiceNow data source each value is
            translated to its SN caseType equivalent (support → default_case).
        searchQuery:
          type: string
          description: Case-insensitive match against subject, number, and internal_id.
        projectIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by project UUIDs.
        deploymentIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by deployment UUIDs.
        stateKeys:
          type: array
          items:
            type: string
            enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: Filter by case states.
        severityKeys:
          type: array
          items:
            type: string
            enum: [catastrophic, critical, high, medium, low]
          description: Filter by severity. Only applicable when typeKeys includes support.
        issueTypeKeys:
          type: array
          items:
            type: string
            enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Filter by issue type.
        engagementTypeKeys:
          type: array
          items:
            type: string
            enum: [migration, consultancy, new_feature_improvement, follow_up, onboarding]
          description: Filter by engagement type. Only applicable when typeKeys includes engagement.
        closedStartDate:
          type: string
          format: date-time
          description: "Return cases closed on or after this UTC timestamp (YYYY-MM-DDTHH:MM:SSZ)."
        closedEndDate:
          type: string
          format: date-time
        startCreatedDate:
          type: string
          format: date-time
        endCreatedDate:
          type: string
          format: date-time
        startUpdatedDate:
          type: string
          format: date-time
        endUpdatedDate:
          type: string
          format: date-time
        createdBy:
          type: array
          items:
            type: string
            format: email
          description: Filter by creator email addresses.
        createdByMe:
          type: boolean
          description: When true, restrict results to cases created by the authenticated user.

    SearchCasesRequest:
      type: object
      properties:
        filters:
          $ref: '#/components/schemas/SearchCasesFilters'
        sortBy:
          type: object
          properties:
            field:
              type: string
              enum: [createdOn, updatedOn, severity, state]
              description: Column to sort by. Defaults to createdOn.
            order:
              type: string
              enum: [asc, desc]
              description: Sort direction. Defaults to desc.
        pagination:
          $ref: '#/components/schemas/Pagination'

    UserRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          description: firstName + lastName (null for ServiceNow data source)
          nullable: true
        userId:
          type: string
          description: Username / login identifier (null for ServiceNow data source)
          nullable: true
        email:
          type: string
          format: email

    AssignedEngineerRef:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true

    CaseNumberRef:
      type: object
      nullable: true
      properties:
        id:
          type: string
        number:
          type: string

    AccountRef:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string

    UserIDEmailRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    EntityRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    DeployedProductRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          description: Product name combined with version (e.g. "API Manager 4.3.0").

    Case:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        internalId:
          type: string
        createdBy:
          type: string
        projectId:
          type: string
        deploymentId:
          type: string
        deployedProductId:
          type: string
        subject:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
          nullable: true

    CaseView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        internalId:
          type: string
        subject:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        workState:
          type: string
          enum: [ongoing, paused]
          nullable: true
          description: Work sub-state, present only when state is work_in_progress.
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time
        closedOn:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the case was closed. null if not yet closed.
        createdBy:
          $ref: '#/components/schemas/UserRef'
        project:
          $ref: '#/components/schemas/EntityRef'
        deployment:
          $ref: '#/components/schemas/EntityRef'
        deployedProduct:
          $ref: '#/components/schemas/DeployedProductRef'
        product:
          $ref: '#/components/schemas/EntityRef'
        assignedEngineer:
          nullable: true
          $ref: '#/components/schemas/AssignedEngineerRef'
        parentCase:
          nullable: true
          $ref: '#/components/schemas/CaseNumberRef'
        relatedCase:
          nullable: true
          $ref: '#/components/schemas/CaseNumberRef'
        account:
          nullable: true
          $ref: '#/components/schemas/AccountRef'

    CaseSearchView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        internalId:
          type: string
        number:
          type: string
        createdOn:
          type: string
          description: Creation timestamp. RFC3339 for Postgres; raw SN timestamp string for ServiceNow.
        createdBy:
          type: string
          format: email
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        issueType:
          type: string
          nullable: true
          description: Issue type enum value (Postgres) or raw SN label (ServiceNow).
        state:
          type: string
          description: State enum value (Postgres) or raw SN label (ServiceNow).
        severity:
          type: string
          nullable: true
          description: Severity enum value (Postgres) or raw SN label (ServiceNow). Null for non-support cases.
        catalog:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
          description: Populated for ServiceNow data source only.
        catalogItem:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
          description: Populated for ServiceNow data source only.
        assignedTeam:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
        product:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
        engagementType:
          type: string
          nullable: true
          description: Engagement type label. Non-null only when caseType is engagement.
        workState:
          type: string
          nullable: true
          description: Work sub-state label. Non-null only when state is work_in_progress.
        caseType:
          type: string
          description: Case type value (Postgres) or raw SN caseType name (ServiceNow).
        project:
          $ref: '#/components/schemas/EntityRef'
        deployment:
          $ref: '#/components/schemas/EntityRef'
        deployedProduct:
          $ref: '#/components/schemas/EntityRef'
        assignedEngineer:
          nullable: true
          $ref: '#/components/schemas/AssignedEngineerRef'
        parentCase:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
        relatedCase:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
        conversation:
          nullable: true
          $ref: '#/components/schemas/EntityRef'
          description: Populated for ServiceNow data source only.

