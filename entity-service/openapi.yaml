              description: "ISO-8601 UTC datetime (YYYY-MM-DDTHH:MM:SSZ)"
            closedEndDate:
              type: string
              format: date-time
              description: "ISO-8601 UTC datetime (YYYY-MM-DDTHH:MM:SSZ)"
        sortBy:
          type: object
          required: [field, order]
