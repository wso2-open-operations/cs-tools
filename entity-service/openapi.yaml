openapi: 3.0.1
info:
  title: Entity Service API
  version: 1.0.0
servers:
  - url: "{server}:{port}/"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /health:
    get:
      summary: Health check endpoint.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Ok

  /users/me:
    get:
      summary: Get the profile of the currently authenticated user.
      description: >
        Returns profile fields for the user identified by the x-user-id-token header.
        Supported by the ServiceNow data source only.
      operationId: getUserMe
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserMeResponse'
        "401":
          description: Unauthorized — x-user-id-token header is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update the profile of the currently authenticated user.
      description: >
        Updates mutable profile fields for the user identified by the x-user-id-token header.
        Supported by the ServiceNow data source only.
      operationId: patchUserMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserMeRequest'
      responses:
        "200":
          description: User profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchUserMeResponse'
        "400":
          description: Bad request — missing or invalid field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — x-user-id-token header is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/search:
    post:
      summary: Search users with optional filters, sort, and pagination.
      description: >
        Returns a paginated list of users. When the data source is ServiceNow
        the response uses `SNUser` (name, timeZone, active, roles); when the
        data source is postgres it uses `User` (firstName, lastName, userType).
      operationId: searchUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchUsersRequest'
      responses:
        "200":
          description: Users matching the supplied filters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SearchUsersResponse'
                  - $ref: '#/components/schemas/SearchSNUsersResponse'
        "400":
          description: Bad request — invalid filter value, sort field, or pagination limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{id}:
    get:
      summary: Get an account by ID.
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The account with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/search:
    post:
      summary: Search accounts by name or Salesforce ID.
      operationId: searchAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAccountsRequest'
      responses:
        "200":
          description: Accounts matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAccountsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}:
    get:
      summary: Get a project by ID.
      operationId: getProject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The project with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailsView'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/search:
    post:
      summary: Search projects by name, key, or subscription type.
      operationId: searchProjects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProjectsRequest'
      responses:
        "200":
          description: Projects matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProjectsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/search:
    post:
      summary: Search products by name.
      description: >
        Returns a paginated list of products matching the search query.
        When the ServiceNow data source is active the response uses
        SearchSNProductsResponse (no timestamp fields; class is a ServiceNow label).
        Otherwise the response uses SearchProductsResponse.
      operationId: searchProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProductsRequest'
      responses:
        "200":
          description: Products matching the search query.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SearchProductsResponse'
                  - $ref: '#/components/schemas/SearchSNProductsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Missing or invalid x-user-id-token header (ServiceNow data source only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}/versions/search:
    post:
      summary: Search versions of a specific product.
      operationId: searchProductVersions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchProductVersionsRequest'
      responses:
        "200":
          description: Product versions matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchProductVersionsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployments:
    post:
      summary: Create a new deployment.
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        "201":
          description: Deployment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeploymentResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — x-user-id-token header is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployments/{id}:
    patch:
      summary: Update a deployment's name, type, description, or deactivate it.
      operationId: patchDeployment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        "200":
          description: Deployment updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateDeploymentResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized (missing x-user-id-token header).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Deployment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployments/search:
    post:
      summary: Search deployments by name, project IDs, or deployment type.
      operationId: searchDeployments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchDeploymentsRequest'
      responses:
        "200":
          description: Deployments matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDeploymentsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}:
    get:
      summary: Get a support case by ID.
      operationId: getCase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The case with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseView'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a support case.
      description: |
        Updates exactly one field of the case. Provide exactly one of: `state`, `severity`,
        `workState`, `watchList`, or `assigneeEmail`. `watchList` and `assigneeEmail` are supported
        only when the ServiceNow data source is active.
      operationId: patchCase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseRequest'
      responses:
        "200":
          description: Case updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCaseResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases:
    post:
      summary: Create a new support case.
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        "201":
          description: Case created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCaseResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/search:
    post:
      summary: Search support cases.
      operationId: searchCases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchCasesRequest'
      responses:
        "200":
          description: Cases matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCasesResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/comments:
    post:
      summary: Create a comment on a support case.
      operationId: createCaseComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseCommentRequest'
      responses:
        "201":
          description: Comment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseComment'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cases/{id}/github-issues:
    post:
      summary: File a GitHub issue against a product's internal repo from a support case (ServiceNow data source only).
      operationId: createCaseGithubIssue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseGithubIssueRequest'
      responses:
        "201":
          description: GitHub issue created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCaseGithubIssueResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments:
    post:
      summary: Upload a file attachment to a support case.
      operationId: createCaseAttachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentRequest'
      responses:
        "201":
          description: Attachment uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAttachmentResponse'
        "400":
          description: Bad request (missing fields, invalid data URI, or file exceeds 10 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/search:
    post:
      summary: Search attachments linked to a support case.
      operationId: searchCaseAttachments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAttachmentsRequest'
      responses:
        "200":
          description: Paginated list of attachments for the case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAttachmentsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/{id}/content:
    get:
      summary: Download the binary content of a case attachment.
      operationId: getCaseAttachmentContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Attachment UUID.
      responses:
        "200":
          description: Raw file content. Content-Type reflects the actual file type (e.g. image/png, application/pdf).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Attachment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/{id}:
    delete:
      summary: Delete a case attachment (ServiceNow data source only).
      operationId: deleteCaseAttachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Attachment UUID.
      responses:
        "200":
          description: Attachment deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAttachmentResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Attachment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployed-products:
    post:
      summary: Create a new deployed product (ServiceNow data source only).
      operationId: createDeployedProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeployedProductRequest'
      responses:
        "201":
          description: Deployed product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeployedProductResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — x-user-id-token header is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployed-products/{id}:
    patch:
      summary: Update a deployed product's cores, tps, description, or deactivate it (ServiceNow data source only).
      operationId: patchDeployedProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeployedProductRequest'
      responses:
        "200":
          description: Deployed product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateDeployedProductResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — x-user-id-token header is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Deployed product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployed-products/search:
    post:
      summary: Search deployed products by deployment IDs.
      operationId: searchDeployedProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchDeployedProductsRequest'
      responses:
        "200":
          description: Deployed products matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDeployedProductsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /call-requests:
    post:
      summary: Create a call request (ServiceNow data source only).
      operationId: createCallRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallRequestRequest'
      responses:
        "201":
          description: Call request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCallRequestResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /call-requests/search:
    post:
      summary: Search call requests (ServiceNow data source only).
      operationId: searchCallRequests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchCallRequestsRequest'
      responses:
        "200":
          description: Call requests matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCallRequestsResponse'
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /call-requests/{id}:
    patch:
      summary: Update a call request (ServiceNow data source only).
      operationId: updateCallRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
