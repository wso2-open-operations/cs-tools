    UpdateCaseRequest:
      type: object
      description: |
        Exactly one of `state`, `severity`, `workState`, `watchList`, or `assigneeEmail` must be provided.
        `watchList` and `assigneeEmail` are supported only for the ServiceNow data source.
      oneOf:
        - required: [state]
        - required: [severity]
        - required: [workState]
        - required: [watchList]
        - required: [assigneeEmail]
      properties:
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: The new state to transition the case to.
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: The new severity of the case.
        workState:
          type: string
          enum: [ongoing, paused]
          description: The new work sub-state of the case. Only applicable when the case state is work_in_progress.
        watchList:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to set as the case watch list (ServiceNow only).
        assigneeEmail:
          type: string
          format: email
          description: Email of the engineer to assign to this case (ServiceNow only).

    UpdateCaseResponse:
      type: object
      required: [message, case]
      properties:
        message:
          type: string
        case:
          $ref: '#/components/schemas/UpdatedCase'

    UpdatedCase:
      type: object
      required: [id, updatedOn]
      properties:
        id:
          type: string
          format: uuid
        updatedOn:
          type: string
          format: date-time
        updatedBy:
          type: string
          description: Email or display name of the user who performed the update.
        state:
          type: string
          enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
        workState:
          type: string
          enum: [ongoing, paused]
          nullable: true
          description: Work sub-state after the update. null when state is not work_in_progress.
        watchList:
          type: array
          items:
            $ref: '#/components/schemas/WatchListUser'
        assignedTo:
          nullable: true
          $ref: '#/components/schemas/AssignedEngineerRef'

    WatchListUser:
      type: object
      required: [id, userName]
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    CreateCaseRequest:
      type: object
      required: [type, projectId, deploymentId, deployedProductId]
      properties:
        type:
          type: string
          enum: [case, service_request, security_report_analysis]
          description: |
            Case type.
            - `case`: standard support case; requires `subject`, `description`, `severity`, `issueType`.
            - `service_request`: catalog-based service request (ServiceNow only); requires `catalogId`, `catalogItemId`, `variables`.
            - `security_report_analysis`: security report (ServiceNow only); requires `subject`, `description`, and at least one entry in `attachments`.
        projectId:
          type: string
          format: uuid
        deploymentId:
          type: string
          format: uuid
        deployedProductId:
          type: string
          format: uuid
        subject:
          type: string
          description: Required for `case` and `security_report_analysis` types.
        description:
          type: string
          description: Required for `case` and `security_report_analysis` types.
        severity:
          type: string
          enum: [catastrophic, critical, high, medium, low]
          description: Required for `case` type.
        issueType:
          type: string
          enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Required for `case` type.
        catalogId:
          type: string
          format: uuid
          description: Required for `service_request` type. UUID of the catalog.
        catalogItemId:
          type: string
          format: uuid
          description: Required for `service_request` type. UUID of the catalog item.
        variables:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Variable'
          description: Required for `service_request` type.
        attachments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CaseAttachment'
          description: Required for `security_report_analysis` type (at least one entry).
        relatedCaseId:
          type: string
          format: uuid
          description: Optional UUID of a related case.
        conversationId:
          type: string
          format: uuid
          description: Optional UUID of a related conversation.
        watchList:
          type: array
          items:
            type: string
          description: Optional list of user IDs to notify.

    CreateCaseResponse:
      type: object
      properties:
        message:
          type: string
        case:
          type: object
          properties:
            id:
              type: string
            internalId:
              type: string
            number:
              type: string
            createdBy:
              type: string
            createdOn:
              type: string
              format: date-time
            state:
              type: string

    SearchCasesFilters:
      type: object
      properties:
        types:
          type: array
          items:
            type: string
            enum: [case, service_request, security_report_analysis, announcement, engagement]
          description: |
            Filter by case type. For the ServiceNow data source each value is
            translated to its SN caseTypes equivalent (case → default_case).
        searchQuery:
          type: string
          description: Case-insensitive match against subject, number, and internal_id.
        projectIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by project UUIDs.
        deploymentIds:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by deployment UUIDs.
        states:
          type: array
          items:
            type: string
            enum: [open, work_in_progress, waiting_on_wso2, awaiting_info, reopened, solution_proposed, closed]
          description: Filter by case states.
        severities:
          type: array
          items:
            type: string
            enum: [catastrophic, critical, high, medium, low]
          description: Filter by severity. Only applicable when types includes case.
        issueTypes:
          type: array
          items:
            type: string
            enum: [error, partial_outage, performance_degradation, question, security_or_compliance, total_outage]
          description: Filter by issue type.
        engagementTypes:
          type: array
          items:
            type: string
            enum: [migration, consultancy, new_feature_improvement, follow_up, onboarding]
          description: Filter by engagement type. Only applicable when types includes engagement.
        closedStartDate:
          type: string
          format: date-time
          description: "Return cases closed on or after this UTC timestamp (YYYY-MM-DDTHH:MM:SSZ)."
        closedEndDate:
          type: string
          format: date-time
        startCreatedDate:
          type: string
          format: date-time
        endCreatedDate:
          type: string
          format: date-time
        startUpdatedDate:
          type: string
          format: date-time
        endUpdatedDate:
          type: string
          format: date-time
        createdBy:
