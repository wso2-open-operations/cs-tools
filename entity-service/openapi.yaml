components:
  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          description: Number of results per page. Defaults to 20, capped at 100.
        offset:
          type: integer
          description: Zero-based offset into the result set.

    GetUserMeResponse:
      type: object
      required: [id, email, lastName, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        timeZone:
          type: string
        roles:
          type: array
          items:
            type: string

    PatchUserMeRequest:
      type: object
      required: [timeZone]
      properties:
        timeZone:
          type: string
          description: User's preferred time zone (e.g. "America/New_York")

    PatchUserMeUpdated:
      type: object
      required: [id, updatedBy, updatedOn]
      properties:
        id:
          type: string
          format: uuid
        updatedBy:
          type: string
        updatedOn:
          type: string

    PatchUserMeResponse:
      type: object
      required: [message, user]
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/PatchUserMeUpdated'

    SearchUsersRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/UserPagination'
        filters:
          $ref: '#/components/schemas/SearchUsersFilters'
        sortBy:
          $ref: '#/components/schemas/UserSortBy'

    UserPagination:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
          description: Number of results per page. Defaults to 10, capped at 50.
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Zero-based offset into the result set.

    SearchUsersFilters:
      type: object
      properties:
        searchQuery:
          type: string
          maxLength: 200
          description: Case-insensitive match against username and email.
        roles:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [internal, agent, admin, commenter, external, customer, customer_admin, partner, partner_admin]
          description: Filter by one or more ServiceNow roles. ServiceNow data source only.
        userNames:
          type: array
          maxItems: 50
          items:
            type: string
          description: Filter to specific usernames (exact match).
        emails:
          type: array
          maxItems: 50
          items:
            type: string
          description: Filter to specific email addresses (exact match).
        active:
          type: boolean
          nullable: true
          description: When set, restricts results to active or inactive users.

    UserSortBy:
      type: object
      properties:
        field:
          type: string
          enum: [name, createdOn, updatedOn]
          description: Column to sort by.
        order:
          type: string
          enum: [asc, desc]
          description: Sort direction.

    User:
      type: object
      description: User as stored in the postgres data source.
      properties:
        id:
          type: string
        userName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        userType:
          type: string
          enum: [internal, customer, system]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SNUser:
      type: object
      description: User as returned by the ServiceNow data source.
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        name:
          type: string
        email:
          type: string
        timeZone:
          type: string
          nullable: true
        active:
          type: boolean
        createdOn:
          type: string
        updatedOn:
          type: string
        roles:
          type: array
          items:
            type: string

    SearchUsersResponse:
      type: object
      description: Paginated user list from the postgres data source.
      required: [users, total, limit, offset, hasMore]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchSNUsersResponse:
      type: object
      description: Paginated user list from the ServiceNow data source.
      required: [users, total, limit, offset]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/SNUser'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    SearchAccountsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against name and sf_id.

    Account:
      type: object
      properties:
        id:
          type: string
        sfId:
          type: string
        name:
          type: string
        tier:
          type: string
          enum: [basic, enterprise]
        region:
          type: string
          nullable: true
        activationDate:
          type: string
          format: date-time
        deactivationDate:
          type: string
          format: date-time
          nullable: true
        ownerId:
          type: string
        technicalOwnerId:
          type: string
          nullable: true
        agentEnabled:
          type: boolean
        kbReferencesEnabled:
          type: boolean
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchAccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchProjectsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against name, key, and subscription_type.

    ProjectAccountRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        activationDate:
          type: string
          format: date-time
          nullable: true
        tier:
          type: string
        region:
          type: string
          nullable: true
        agentEnabled:
          type: boolean
        kbReferencesEnabled:
          type: boolean

    ProjectDetailsView:
      type: object
      properties:
        id:
          type: string
        account:
          $ref: '#/components/schemas/ProjectAccountRef'
        sfId:
          type: string
        name:
          type: string
        key:
          type: string
        subscriptionType:
          type: string
          enum:
            - development_support
            - managed_cloud_subscription
            - evaluation_subscription
            - subscription
            - cloud_evaluation_support
            - internal
            - platformer_subscription
            - cloud_support
            - professional_services
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    ProjectView:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        subscriptionType:
          type: string
          enum:
            - development_support
            - managed_cloud_subscription
            - evaluation_subscription
            - subscription
            - cloud_evaluation_support
            - internal
            - platformer_subscription
            - cloud_support
            - professional_services
        createdOn:
          type: string
          format: date-time

    SearchProjectsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectView'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SearchProductsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        searchQuery:
          type: string
          description: Case-insensitive match against product name.

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        class:
          type: string
          enum: [software, service]
        createdOn:
          type: string
          format: date-time
        updatedOn:
          type: string
          format: date-time

    SearchProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    SNProduct:
      description: Product returned by the ServiceNow data source. Timestamp fields are absent; class is a ServiceNow label (e.g. "Software Model").
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
